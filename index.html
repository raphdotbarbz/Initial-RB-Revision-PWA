<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <meta name="theme-color" content="#1A1A2E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RB Revision">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="stylesheet" href="/assets/styles.css">
  <script>
    if ("serviceWorker" in navigator) {
      window.rbServiceWorker = navigator.serviceWorker.register("/service-worker.js").catch((error) => {
        console.error("Service worker registration failed", error);
      });
    }
  </script>
  <title>RB Revision</title>
</head>
<body>
  <div id="app" class="app-shell" aria-live="polite">
    <div class="boot-screen">
      <div class="boot-mark">RB</div>
      <h1>RB Revision</h1>
      <p>Loading your offline study shell...</p>
    </div>
  </div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
